apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
      - name: payment-service
        image: pedidos-veloz/payment-service:latest
        ports:
        - containerPort: 5002
        env:
        - name: RABBITMQ_URL
          value: "amqp://guest:guest@messaging:5672/"
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
spec:
  selector:
    app: payment-service
  ports:
  - port: 5002
    targetPort: 5002