apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      containers:
      - name: inventory-service
        image: pedidos-veloz/inventory-service:latest
        ports:
        - containerPort: 5003
        env:
        - name: DATABASE_URL
          value: "postgresql://user:password@db:5432/pedidos"
        - name: RABBITMQ_URL
          value: "amqp://guest:guest@messaging:5672/"
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
spec:
  selector:
    app: inventory-service
  ports:
  - port: 5003
    targetPort: 5003