apiVersion: apps/v1
kind: Deployment
metadata:
  name: messaging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: messaging
  template:
    metadata:
      labels:
        app: messaging
    spec:
      containers:
      - name: messaging
        image: pedidos-veloz/messaging:latest
        ports:
        - containerPort: 5672
        - containerPort: 15672
---
apiVersion: v1
kind: Service
metadata:
  name: messaging
spec:
  selector:
    app: messaging
  ports:
  - port: 5672
    targetPort: 5672
  - port: 15672
    targetPort: 15672